<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Home Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase SDK -->

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      transition: 0.3s;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 20px;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
    }

    .danger {
      background: #ffcccc !important;
    }
  </style>

</head>

<body>

<h2>🔥 SMART HOME</h2>

<div class="box">
  <p>Nhiệt độ: <span id="temp" class="value">--</span> °C</p>
  <p>Độ ẩm: <span id="hum" class="value">--</span> %</p>
  <p>Gas: <span id="gas" class="value">--</span></p>
  <p>Cửa: <span id="door" class="value">--</span></p>
</div>

<script>
  // 🔥 CONFIG FIREBASE (của bạn)
  var firebaseConfig = {
    apiKey: "AIzaSyDqEvdu3wV4J0BCLSpaPB2IFXWWeEE_Agc",
    databaseURL: "https://myapp12-40fd8-default-rtdb.firebaseio.com/"
  };

  firebase.initializeApp(firebaseConfig);

  var db = firebase.database().ref("sensor");

  db.on("value", function(snapshot) {

    var data = snapshot.val();

    if (!data) return;

    document.getElementById("temp").innerText = data.temp;
    document.getElementById("hum").innerText = data.hum;
    document.getElementById("gas").innerText = data.gas;
    document.getElementById("door").innerText = data.door;

    // 🚨 cảnh báo gas
    if (data.gas > 1800) {
      document.body.classList.add("danger");
    } else {
      document.body.classList.remove("danger");
    }

  });
</script>

</body>
</html>
